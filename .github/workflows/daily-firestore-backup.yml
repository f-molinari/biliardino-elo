name: Daily Firestore Backup

on:
  schedule:
    - cron: "0 19 * * *" # Runs every day at 19:00 UTC
    - cron: "0 20 * * *" # Runs every day at 20:00 UTC
  workflow_dispatch: # Allows manual trigger from GitHub UI

jobs:
  backup:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "20"

      - name: Install dependencies
        run: npm ci
        working-directory: scripts

      - name: Run Firestore backup
        env:
          FIREBASE_SERVICE_ACCOUNT: ${{ secrets.FIREBASE_SERVICE_ACCOUNT }}
          FIRESTORE_COLLECTION: ${{ vars.FIRESTORE_COLLECTION }}
        run: node scripts/backup.js

      - name: Commit and push backup file
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add backups/
          git diff --cached --quiet || git commit -m "chore: daily Firestore backup $(date +'%Y-%m-%d')"
          git push
