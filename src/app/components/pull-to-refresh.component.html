<div id="pull-refresh-shell" class="pull-refresh-shell" data-state="idle" aria-live="polite" aria-atomic="true">
  <div class="pull-refresh-surface">
    <div class="pull-refresh-progress">
      <span class="pull-refresh-progress-bar"></span>
    </div>

    <div class="pull-refresh-body">
      <div class="pull-refresh-scene" aria-hidden="true">
        <div id="ptr-kick-player" class="pull-refresh-kicker">{{kickPlayerSvg}}</div>
        <div id="ptr-ball" class="pull-refresh-ball">
          <svg width="20" height="20" viewBox="0 0 80 80">
            <defs>
              <radialGradient id="ptr-ball-grad" cx="0.38" cy="0.32" r="0.6">
                <stop offset="0%" stop-color="#ffffff" />
                <stop offset="70%" stop-color="#eeeeee" />
                <stop offset="100%" stop-color="#b8b8b8" />
              </radialGradient>
              <radialGradient id="ptr-ball-shine" cx="0.30" cy="0.25" r="0.20">
                <stop offset="0%" stop-color="rgba(255,255,255,0.9)" />
                <stop offset="100%" stop-color="rgba(255,255,255,0)" />
              </radialGradient>
            </defs>
            <circle cx="40" cy="40" r="35" fill="url(#ptr-ball-grad)" />
            <circle cx="40" cy="40" r="35" fill="url(#ptr-ball-shine)" />
          </svg>
        </div>
      </div>

      <div class="min-w-0">
        <div id="pull-refresh-label" class="pull-refresh-label font-ui allow-pwa-select">{{label}}</div>
        <div id="pull-refresh-hint" class="pull-refresh-hint font-body allow-pwa-select">{{hint}}</div>
      </div>
    </div>
  </div>
</div>
